name: Performance Gate (Lighthouse)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lighthouse-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (for gate script)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Docker BuildKit
        run: |
          echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV
          echo "COMPOSE_DOCKER_CLI_BUILD=1" >> $GITHUB_ENV

      # 🔥 ДИНАМИЧЕСКИЙ THRESHOLD
      - name: Set Lighthouse threshold by branch
        run: |
          echo "Current branch: $GITHUB_REF_NAME"
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "LH_THRESHOLD=0.90" >> $GITHUB_ENV
            echo "Using strict threshold 0.90 for main"
          else
            echo "LH_THRESHOLD=0.85" >> $GITHUB_ENV
            echo "Using standard threshold 0.85 for non-main branch"
          fi

      - name: Build & run Lighthouse container
        run: |
          docker compose up --build --abort-on-container-exit --exit-code-from lighthouse lighthouse

      - name: Run Performance Gate
        run: |
          node scripts/performance-gate.js

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: artifacts/lighthouse