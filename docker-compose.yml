services:

  app:
    container_name: qa-angular-playwright-app
    build:
      context: .
      dockerfile: app/Dockerfile.app
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s


  e2e:
    container_name: qa-angular-playwright-e2e
    build:
      context: .
      dockerfile: app/Dockerfile.e2e
    depends_on:
      app:
        condition: service_healthy
    environment:
      BASE_URL: "http://app:80"
      DOCKER: "true"
      CI: "true"
    volumes:
      - ./artifacts/test-results:/work/test-results
      - ./artifacts/playwright-report:/work/playwright-report
      - ./artifacts/blob-report:/work/blob-report
    shm_size: "1gb"


  lighthouse:
    container_name: qa-angular-playwright-lighthouse
    build:
      context: .
      dockerfile: Dockerfile.lighthouse
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./artifacts/lighthouse:/reports
      - ./app/performance/lighthouse-budget.json:/budget.json:ro
    command: >
      bash -lc '
        set -euo pipefail

        echo "=============================="
        echo "🚦 Lighthouse run started"
        echo "=============================="

        mkdir -p /reports
        rm -f /reports/*

        echo "🟦 LOGIN (JSON)"
        lighthouse http://app:80/login \
          --only-categories=performance \
          --budgets-path=/budget.json \
          --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
          --output=json \
          --output-path=/reports/login.json \
          --quiet

        echo "🟦 LOGIN (HTML)"
        lighthouse http://app:80/login \
          --only-categories=performance \
          --budgets-path=/budget.json \
          --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
          --output=html \
          --output-path=/reports/login.html \
          --quiet

        echo "🟦 DASHBOARD (JSON)"
        lighthouse http://app:80/dashboard \
          --only-categories=performance \
          --budgets-path=/budget.json \
          --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
          --output=json \
          --output-path=/reports/dashboard.json \
          --quiet

        echo "🟦 DASHBOARD (HTML)"
        lighthouse http://app:80/dashboard \
          --only-categories=performance \
          --budgets-path=/budget.json \
          --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
          --output=html \
          --output-path=/reports/dashboard.html \
          --quiet

        echo "=============================="
        echo "✅ Lighthouse reports generated:"
        ls -la /reports
        echo "=============================="
      '
